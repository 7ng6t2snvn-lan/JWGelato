const RECIPES = [
  { id:'r1', name:'Chicken Stock', category:'Stocks', yield:'Basic ratio; scales as needed', ingredients:[{amount:'8 lbs',name:'Chicken Bones'},{amount:'1 lb',name:'Mirepoix'},{amount:'1 gal',name:'Cold Water'},{amount:'1 lb',name:'Chicken Feet'},{amount:'to taste',name:'Aromatics — Peppercorns, Bay Leaves, Parsley Stems'}], steps:['Place bones in stock pot. Cover with cold water. Bring to a boil to blanch and remove impurities. Dump water, save bones.','Place bones back in pot with cold water, mirepoix, and aromatics. Bring to a boil.','Reduce heat to 185°F. Skim as needed. Cook 3–4 hours.','Strain through chinois into shallow pan. Cool safely. Remove fat once cool.'] },
  { id:'r2', name:'Roasted Beef / Veal Stock', category:'Stocks', yield:'~1 gallon', ingredients:[{amount:'8 lbs',name:'Beef or Veal Bones'},{amount:'1 lb',name:'Mirepoix'},{amount:'1 gal',name:'Cold Water'},{amount:'2 ea',name:'Split Hog Foot'},{amount:'2 oz',name:'Tomato Paste'},{amount:'16 oz',name:'Red Wine'},{amount:'to taste',name:'Aromatics'}], steps:['Roast bones at 400°F until golden/dark brown.','Caramelize mirepoix; pincé with tomato paste until fond develops. Deglaze with red wine; reduce by half.','Add roasted bones and cold water. Bring to a simmer. Skim impurities. Add aromatics.','Simmer at 185°F for 4 hours. Strain through chinois. Cool in shallow pan.'] },
  { id:'r3', name:'Rhubarb Ketchup', category:'Sauces', yield:'Adjust consistency with xanthan', ingredients:[{amount:'2 lbs',name:'Rhubarb'},{amount:'¼ cup',name:'Apple Cider Vinegar'},{amount:'½ cup',name:'Port LBV'},{amount:'1 cup',name:'Sugar'},{amount:'½ ea',name:'Lemon, zest only'},{amount:'to taste',name:'Salt and Pepper'},{amount:'as needed',name:'Xanthan Gum'}], steps:['Combine rhubarb, vinegar, port, sugar, and lemon zest.','Simmer for 8 minutes.','Blend in VitaPrep until very smooth.','Season with salt and pepper. Adjust acid and sweetness.','Adjust consistency with xanthan gum to prevent syneresis.'] },
  { id:'r4', name:'Foie Gras Gastrique', category:'Sauces', yield:'~1 cup', ingredients:[{amount:'¼ cup',name:'Foie Gras Fat'},{amount:'½ T',name:'Water'},{amount:'½ cup',name:'Sugar'},{amount:'6 T',name:'Balsamic or Sherry Vinegar'}], steps:['Combine foie fat, water, and sugar. Cook over medium heat, whisking, until mixture looks like taffy.','Add vinegar while stirring. Reduce by half over 3 minutes.'] },
  { id:'r5', name:'Anchovy Cure', category:'Cures & Preserved', yield:'Hold at least 48 hrs before service', ingredients:[{amount:'as needed',name:'Kosher Salt'},{amount:'to cover',name:'White Wine Vinegar / Verjus'},{amount:'to taste',name:'Citrus Zest'},{amount:'to taste',name:'Crushed Red Chile'},{amount:'liberal',name:'Agrumato Lemon Oil'}], steps:['Chop off heads. Layer anchovies between layers of kosher salt.','Cover with white wine vinegar. Wait 24 hours.','Remove from marinade and gently remove spine.','Layer anchovies between layers of citrus zest and crushed red chiles.','Liberally season with verjus and agrumato lemon oil. Let sit at least 24 hours before using.'] },
  { id:'r6', name:'Sardine Cure', category:'Cures & Preserved', yield:'24–48 hr cure depending on size', ingredients:[{amount:'as needed',name:'Kosher Salt'},{amount:'to cover',name:'Yuzu Juice'},{amount:'to taste',name:'Lime Zest'},{amount:'to taste',name:'Togarashi'},{amount:'to cover',name:'Olive Oil'}], steps:['Fillet sardines. Cover with kosher salt. Let sit 10–15 minutes.','Remove excess salt. Combine lime zest and togarashi; re-season sardines.','Cover with yuzu juice and olive oil. Cure 24–48 hours depending on size.'] },
  { id:'r7', name:'Black Sesame Purée', category:'Purees & Emulsions', yield:'Holds well refrigerated', ingredients:[{amount:'230g',name:'Black Sesame Seeds'},{amount:'100g',name:'Sesame Oil'},{amount:'1g',name:'Ultra-Tex 8'}], steps:['Lightly toast seeds in sesame oil over low heat until aroma is achieved.','Purée in VitaPrep at medium-low speed until very, very smooth — about 10 minutes.','Once consistency is achieved, shear in Ultra-Tex 8 until smooth.'] },
  { id:'r8', name:'Brown Butter Purée', category:'Purees & Emulsions', yield:'~1 cup', ingredients:[{amount:'8 oz',name:'Browned Milk Solids'},{amount:'3 oz',name:'Water'},{amount:'2 tsp',name:'Corn Syrup'},{amount:'1 T',name:'Sherry Vinegar'}], steps:['Combine all ingredients.','Blend until smooth and emulsified.'] },
  { id:'r9', name:'Whipped Crispy Artichokes', category:'Components', yield:'Check every 15 min during drying', ingredients:[{amount:'300g',name:'Poached Artichoke Liquid'},{amount:'3.4g',name:'Methocel F50'},{amount:'0.51g',name:'Xanthan Gum'},{amount:'40g',name:'Maltrin M100'}], steps:['Place artichoke liquid in blender. Increase to medium speed until vortex forms. Sprinkle in xanthan gum and Methocel; shear on high until no clumps.','Pour into metal bowl in ice bath. Stir and chill to 10°C to fully hydrate Methocel.','Pour chilled mixture back into blender on medium; add Maltrin and blend on high until homogenous.','Transfer to stand mixer with whisk. Whip from low to high until stiff peaks — light, airy, shapeable.','Spoon irregular dollops onto silicone-lined sheet pan with thin film of release.','Dry in 76°C oven for 1 hour. Check every 15 min. Flip and dry bottoms 20 more minutes. Done when completely dry throughout.'] },
  { id:'r10', name:'Foie Gras Ganache', category:'Components', yield:'Refrigerate after setting', ingredients:[{amount:'750g',name:'Foie Gras'},{amount:'15g',name:'Kosher Salt'},{amount:'1.5g',name:'Pink Salt (curing salt)'},{amount:'11.3g',name:'Sugar'},{amount:'225g',name:'Heavy Cream'},{amount:'7.5g',name:'Silver Gelatin'},{amount:'75g',name:'Heavy Cream (second addition)'}], steps:['While foie is cooking, combine salt, curing salt, sugar, and first cream. Set aside.','Bloom gelatin in second addition of cold cream.','Process foie with seasoned cream mixture until smooth.','Incorporate bloomed gelatin. Pass through tamis if needed.','Set in desired mold. Refrigerate until firm.'] },
  { id:'r11', name:'Chocolate Crémeux', category:'Components', yield:'Pour into molds immediately', ingredients:[{amount:'250g',name:'Chocolate, 72%'},{amount:'300g',name:'Heavy Cream'},{amount:'160g',name:'Water'},{amount:'2g',name:'Agar Agar'},{amount:'49g',name:'Sorbitol'},{amount:'20g',name:'Glucose Powder'},{amount:'1g',name:'Bolivian Rose Salt'},{amount:'2.5 sheets',name:'Silver Gelatin'}], steps:['Combine water, sorbitol, agar agar, and glucose. Boil for 2 minutes.','Scald cream; slowly incorporate into chocolate — go slow, no air bubbles.','Slowly add sorbitol-water mixture to the chocolate.','Stir in bloomed gelatin. Pour into desired molds. Chill until set.'] },
  { id:'r12', name:'Almond "Granola"', category:'Components', yield:'~10 oz', ingredients:[{amount:'4 oz',name:'Marcona Almonds, Whole'},{amount:'1 oz',name:'Glucose Powder'},{amount:'3 oz',name:'Marshmallow'},{amount:'2 oz',name:'Water'},{amount:'to taste',name:'Salt'}], steps:['Combine glucose powder, water, and marshmallow. Bring to a simmer.','Add almonds and cook until coated. Cool completely.','Grind to desired texture. Bake until set.'] },
  { id:'r13', name:'Parisienne Gnocchi', category:'Breads & Doughs', yield:'Large batch; freeze extras', ingredients:[{amount:'1½ cups',name:'Water'},{amount:'12 T (6 oz)',name:'Unsalted Butter'},{amount:'1 T + 1 tsp',name:'Kosher Salt'},{amount:'2 cups',name:'All-Purpose Flour, sifted'},{amount:'2 T',name:'Dijon Mustard'},{amount:'1 T ea',name:'Chervil, Chives, Parsley, Tarragon — chopped'},{amount:'1 cup',name:'Comté or Emmentaler, shredded'},{amount:'5–6 ea',name:'Large Eggs'}], steps:['Set up heavy-duty mixer with paddle. Have all ingredients ready.','Combine water, butter, 1 tsp salt; bring to simmer. Add flour all at once; stir until dough pulls from sides. Stir on heat ~5 min. Transfer to mixer.','Add mustard, herbs, 1 T salt, cheese. Mix briefly. On low, add 3 eggs one at a time. Increase to medium; add 2 more. Dough should slide slowly off a spatula.','Transfer to large pastry bag with 5/8" tip. Rest 30 minutes at room temp.','Pipe 1-inch lengths into lightly simmering salted water. Poach 1–2 min after floating. Drain on paper towels.','Single-layer on parchment; refrigerate 30 min before sautéing, or freeze for storage.'] },
  { id:'r14', name:'Brioche', category:'Breads & Doughs', yield:'1 loaf or formed rolls', ingredients:[{amount:'½ cup',name:'Water, Warm'},{amount:'¼ oz',name:'Active Dry Yeast'},{amount:'10½ oz',name:'Cake Flour'},{amount:'10 oz',name:'All-Purpose Flour'},{amount:'⅓ cup',name:'Sugar'},{amount:'2½ tsp',name:'Salt'},{amount:'6 ea',name:'Eggs, Whole, Room Temperature'},{amount:'10 oz',name:'Butter, Cubed, Room Temperature'}], steps:['Dissolve yeast in warm water. Combine with flours, sugar, salt, and eggs. Mix on medium until dough develops.','Add butter a few cubes at a time, ensuring full incorporation before adding more.','Mix until smooth, shiny, and pulling away from sides cleanly.','Bulk ferment until doubled. Punch down, shape, refrigerate overnight.','Final proof until nearly doubled. Egg wash and bake at 375°F until deep golden.'] },
  { id:'r15', name:'Corn Bread', category:'Breads & Doughs', yield:'10" cast iron or 8" square pan', ingredients:[{amount:'4 T',name:'Butter, olive oil, lard, or bacon drippings'},{amount:'1½ cups',name:'Medium-grind Cornmeal'},{amount:'½ cup',name:'All-Purpose Flour'},{amount:'1½ tsp',name:'Baking Powder'},{amount:'1 tsp',name:'Salt'},{amount:'¼–½ cup',name:'Sugar'},{amount:'2 ea',name:'Eggs'},{amount:'1¼ cups',name:'Milk, plus more if needed'}], steps:['Preheat oven to 375°F. Put fat in cast-iron skillet; place in oven to heat.','Combine dry ingredients. Whisk eggs into milk; stir into dry ingredients with a few swift strokes.','When fat and oven are hot, pour in batter. Smooth top. Bake ~30 minutes until lightly browned and toothpick comes out clean.'] },
  { id:'r16', name:'Pine Nut Tart Dough', category:'Breads & Doughs', yield:'One 10" tart shell', ingredients:[{amount:'10 oz',name:'Pine Nuts, Toasted and Ground'},{amount:'1 lb',name:'All-Purpose Flour'},{amount:'⅓ cup',name:'Sugar'},{amount:'8 oz',name:'Butter'},{amount:'1 ea',name:'Egg'},{amount:'1 tsp',name:'Vanilla'}], steps:['Combine ground pine nuts, flour, and sugar.','Cut in cold butter until mixture resembles coarse crumbs.','Add egg and vanilla; mix until dough just comes together.','Rest in refrigerator before rolling. Blind bake as needed.'] },
  { id:'r17', name:'Financier', category:'Desserts', yield:'Holds 1 week refrigerated', ingredients:[{amount:'250g',name:'Unsalted Butter'},{amount:'100g',name:'Almond Flour'},{amount:'100g',name:'All-Purpose Flour'},{amount:'295g',name:"Confectioner's Sugar"},{amount:'245g (8 large)',name:'Egg Whites'}], steps:['Cook butter to light brown in heavy saucepan, whisking occasionally. Reserve warm.','Combine dry ingredients.','Manually whip egg whites until just frothy and yellow dissipates. Whisk in almond flour mixture.','Slowly whisk in warm brown butter, ensuring complete emulsification.','Chill at least 2 hours. Bake at 325–350°F convection for smaller pieces; 300–325°F for larger.'] },
  { id:'r18', name:'Warm Almond Cake', category:'Desserts', yield:'17–20 min at 350°F', ingredients:[{amount:'10.5 oz',name:'Almond Paste'},{amount:'½ cup',name:'Sugar, Granulated'},{amount:'6 oz',name:'Butter, Unsalted'},{amount:'1¾ oz',name:'Honey'},{amount:'5.5 ea',name:'Eggs, Whole'},{amount:'1¾ oz',name:'Amaretto'},{amount:'½ cup',name:'All-Purpose Flour'},{amount:'pinch',name:'Salt'}], steps:['Combine sugar and almond paste; cream for 4 minutes.','Add butter; mix 8 minutes until light and airy. Scrape sides as needed.','Mix in honey. Add eggs one at a time until fully incorporated.','Add amaretto, flour, and salt. Mix until just combined.','Bake at 350°F for 17–20 minutes until golden brown.'] },
  { id:'r19', name:'Dense Chocolate', category:'Desserts', yield:'Chill at least 4 hours', ingredients:[{amount:'1 lb',name:'Bittersweet Chocolate'},{amount:'8 oz',name:'Butter'},{amount:'6 ea',name:'Egg Yolks'},{amount:'6 ea',name:'Egg Whites'},{amount:'⅓ cup',name:'Honey'},{amount:'¼ cup',name:'Sugar, Granulated'}], steps:['Melt butter and chopped chocolate over a double boiler.','Whip egg whites with sugar to medium peaks; reserve.','Bring honey to a boil; stream into egg yolks while whipping on high until cool.','Stir in melted chocolate mixture. Fold in whipped egg whites.','Place into desired mold. Chill at least 4 hours.'] },
  { id:'r20', name:'Crème Brûlée / Ice Cream / Crème Anglaise', category:'Desserts', yield:'1 quart', ingredients:[{amount:'1 qt',name:'Heavy Cream'},{amount:'8 oz',name:'Sugar, Granulated'},{amount:'10 ea',name:'Egg Yolks'},{amount:'1 ea',name:'Vanilla Bean'}], steps:['Split and scrape vanilla bean; steep in cream until scalded.','Whisk sugar into egg yolks until pale. Temper hot cream into yolk mixture.','For anglaise: return to heat and cook to 180°F (nappe).','For crème brûlée: pour into ramekins; bake in water bath at 325°F until barely set. Chill. Brûlée to serve.','For ice cream: chill base over ice bath; churn per machine instructions.'] },
  { id:'r21', name:'Lemon Curd', category:'Desserts', yield:'~2 cups', ingredients:[{amount:'½ cup',name:'Unsalted Butter'},{amount:'¼ cup',name:'Crème Fraîche'},{amount:'2 ea',name:'Eggs, Whole'},{amount:'3 ea',name:'Egg Yolks'},{amount:'¾ cup',name:'Fresh Lemon Juice'},{amount:'¾ cup',name:'Sugar'},{amount:'1½ tsp',name:'Lemon Zest'}], steps:['Melt butter and crème fraîche together over a double boiler. Set aside.','In a bowl over simmering water, whisk eggs and yolks until warmed. Beat in butter mixture, then lemon juice.','Strain through a sieve into a clean bowl. Return to simmering water.','Add sugar and zest; whisk until warm to touch, about 4 minutes. Chill immediately.'] },
  { id:'r22', name:'Lemon Tart (Sabayon & Pâte Sablée)', category:'Desserts', yield:'One 10" tart', ingredients:[{amount:'2 ea',name:'Eggs, Cold'},{amount:'2 ea',name:'Egg Yolks, Cold'},{amount:'¾ cup',name:'Sugar'},{amount:'½ cup',name:'Fresh Lemon Juice'},{amount:'6 T',name:'Unsalted Butter, Cold'},{amount:'¾ lb',name:'Butter (for dough)'},{amount:'3½ cups',name:'Flour (for dough)'},{amount:'4 ea',name:'Eggs (for dough)'},{amount:'½ cup',name:'Sugar (for dough)'},{amount:'4 T',name:'Cold Water'}], steps:['Pâte Sablée: Combine flour and sugar; cut in cold butter. Add eggs and water; mix until dough just comes together. Refrigerate.','Roll and blind bake tart shell at 350°F until golden. Cool.','Lemon Sabayon: Whisk cold eggs, yolks, sugar, and lemon juice in a bowl over simmering water.','Whisk continuously until thick and ribbon-like, ~8–10 minutes.','Remove from heat; whisk in cold butter pieces one at a time.','Pour into baked shell. Torch if desired. Chill to set.'] },
  { id:'r23', name:'Lace Cookies / Décor', category:'Desserts', yield:'Watch closely — burns fast', ingredients:[{amount:'5 oz',name:'Corn Syrup'},{amount:'5 oz',name:'Butter, Unsalted'},{amount:'5 oz',name:'Sugar'},{amount:'5 oz',name:'All-Purpose Flour'}], steps:['Combine corn syrup, butter, and sugar. Cook to a boil, stirring.','Remove from heat; stir in flour until incorporated.','Drop small spoonfuls onto silpat-lined sheet pan. Bake at 325°F until spread and golden.','Cool briefly; shape while still pliable over molds or cylinders.'] },

  { id:'r60', name:'Brown Butter Beurre Blanc', category:'Sauces', yield:'~2.6L — 70 × 1.1oz portions',
    ingredients:[
      {amount:'1.6 kg', name:'Unsalted butter (to brown)'},
      {amount:'400 g',  name:'Dry white wine'},
      {amount:'200 g',  name:'Champagne vinegar'},
      {amount:'220 g',  name:'Shallots, very fine brunoise'},
      {amount:'160 g',  name:'Heavy cream (stabilizer)'},
      {amount:'16 g',   name:'Kosher salt'},
      {amount:'5 g',    name:'White pepper'},
      {amount:'30 g',   name:'Pernod or Pastis (optional but recommended)'},
      {amount:'40 g',   name:'Lemon juice, to finish'}
    ],
    steps:[
      'Brown the butter in batches in a wide rondeau over medium heat, stirring constantly. Cook until deep golden and nutty — solids should be amber, not black. Strain immediately through a fine chinois into a clean container. Reserve warm.',
      'In a separate saucepan, combine wine, champagne vinegar, and shallots. Reduce over medium heat until nearly dry — about 2–3 tablespoons of liquid remaining. The shallots should be completely soft and the pan almost au sec.',
      'Add heavy cream to the reduction. Bring to a simmer and reduce by half. This is your stabilizing base — do not skip.',
      'Over low heat, mount the brown butter into the cream-reduction base using an immersion blender or whisking vigorously, adding in a slow steady stream. The sauce will emulsify and thicken to a nappé consistency.',
      'Add Pernod or Pastis if using — it amplifies the anise notes and adds depth. Finish with lemon juice. Taste and adjust salt and white pepper.',
      'Hold in a bain marie at 130–140°F. Do not boil or the emulsion will break. Stir gently before each pull. If it tightens too much, loosen with a small splash of warm cream or wine.'
    ]
  },

  { id:'r61', name:'House Champagne Vinaigrette', category:'Sauces', yield:'1 Liter',
    ingredients:[
      {amount:'750 g', name:'Grapeseed oil'},
      {amount:'250 g', name:'Champagne vinegar'},
      {amount:'38 g',  name:'Dijon mustard'},
      {amount:'25 g',  name:'Honey'},
      {amount:'12 g',  name:'Shallot, minced fine'},
      {amount:'0.5 g', name:'Xanthan gum (optional — for service stability)'},
      {amount:'',      name:'Salt and white pepper, to taste'}
    ],
    steps:[
      'Combine minced shallot with a small amount of the champagne vinegar in a small pan. Sweat over low heat 2–3 minutes until softened — removes the raw edge without losing flavor. Cool completely.',
      'Add all the champagne vinegar, Dijon, honey, and cooled shallot to a blender or bowl. If using xanthan gum, add it now and let it hydrate 2 minutes before proceeding.',
      'Blending method: with blender running on low, stream the grapeseed oil in slowly and steadily. Increase speed slightly once half the oil is incorporated. Whisking method: whisk vinegar mixture vigorously while streaming oil in a thin, steady drizzle.',
      'Season assertively with salt and white pepper. Vinaigrette requires more salt than you expect — season until acid and oil are in balance.',
      'Rest 30 minutes before service. The emulsion tightens and flavors marry. Taste again and adjust before plating.',
      'Service: dress to order. Shake or whisk briefly before each use in a squeeze bottle. Xanthan version holds through a full service without breaking; non-xanthan version should be re-emulsified between passes. Shelf life 5–7 days refrigerated.'
    ]
  },

  { id:'r62', name:'Beck Herb Oil', category:'Sauces', yield:'~300–330g finished oil',
    ingredients:[
      {amount:'40 g', name:'Flat-leaf parsley'},
      {amount:'30 g', name:'Basil'},
      {amount:'20 g', name:'Chervil'},
      {amount:'15 g', name:'Chives'},
      {amount:'15 g', name:'Tarragon'},
      {amount:'10 g', name:'Spinach (optional — for color stability)'},
      {amount:'240 g',name:'Grapeseed oil'}
    ],
    steps:[
      'Bring a large pot of well-salted water to a rolling boil. Prepare an ice bath.',
      'Blanch all herbs together for exactly 10 seconds. Shock immediately in ice water — do not let them sit.',
      'Squeeze herbs completely dry. This step is critical — any residual water will prevent proper emulsification and dull the color.',
      'Combine dry herbs and grapeseed oil in a VitaPrep. Blend on high for 1–2 minutes until the mixture heats from friction and turns very bright green.',
      'Strain immediately through a Superbag or chinois lined with a coffee filter. Do not press or squeeze — let it drip freely for 30–60 minutes. Pressing will cloud the oil.',
      'Transfer to a squeeze bottle. Oil should be vivid green, clear, and clean-tasting. Refrigerate — use within 3–4 days for best color.'
    ]
  },

  { id:'r63', name:'Spaetzle', category:'Breads & Doughs', yield:'~4–6 portions',
    ingredients:[
      {amount:'4',       name:'Egg yolks'},
      {amount:'1',       name:'Whole egg'},
      {amount:'1.75 c',  name:'Whole milk'},
      {amount:'1 lb',    name:'All-purpose flour, sifted'},
      {amount:'0.5 tsp', name:'Caraway seed, toasted and ground'},
      {amount:'2 oz',    name:'Unsalted butter, melted'}
    ],
    steps:[
      'Toast caraway seeds in a dry pan over medium heat until fragrant, about 2 minutes. Grind fine in a spice grinder. Set aside.',
      'Whisk together egg yolks, whole egg, and milk until combined.',
      'Sift flour into a separate bowl. Stir in ground caraway.',
      'Add the flour mixture to the wet ingredients in alternating additions with the melted butter, stirring between each addition. Batter should be thick, smooth, and fall in a slow ribbon — not pourable like crepe batter, not stiff like pasta dough.',
      'Bring a large pot of well-salted water to a boil. Working in batches, press batter through a spaetzle maker or large-holed colander directly into the boiling water. Cook until spaetzle float and are tender, about 2–3 minutes.',
      'Remove with a spider or slotted spoon. Spread on an oiled sheet pan to cool if finishing later. To finish: sauté in brown butter over high heat until golden and lightly crisped at the edges.'
    ]
  },

  { id:'r64', name:'Candied Nuts', category:'Components', yield:'~300g',
    ingredients:[
      {amount:'300g',   name:'Nuts (pistachios, walnuts, pecans, etc.)'},
      {amount:'1',      name:'Egg white (~30g), room temperature'},
      {amount:'40g',    name:'Sugar'},
      {amount:'3g',     name:'Fine salt'},
      {amount:'2–2.5g', name:'Chile — Aleppo (fruity, mild) / Espelette (sweet heat) / Cayenne (hot, use less)'}
    ],
    steps:[
      'Preheat oven to 300°F / 150°C. Line a sheet pan with parchment.',
      'Whisk egg white by hand until frothy and loose — bubbles present, slightly airy, but nowhere near stiff peaks. The white should still be fluid. This is the glue, not a meringue.',
      'Add sugar, salt, and chile directly to the frothed white. Fold to combine.',
      'Add nuts and toss until every nut has a thin, even film of the egg white mixture. No pooling at the bottom of the bowl.',
      'Spread in a single layer on the prepared sheet pan. No overlapping — crowded nuts steam instead of dry and will clump.',
      'Bake 20–25 minutes, stirring once at the halfway point for even coating and color.',
      'Pull when dry, set, and just golden. They will still feel slightly soft when warm — this is normal. Do not overbake.',
      'Cool completely on the pan before breaking apart or storing. If tacky when warm, return to oven 3–5 minutes. Tacky nuts will clump solid as they cool.',
      'Current application — Candied Pistachios for Simple Green Salad: use Aleppo at 2.5g. Rough chop after cooling. Storage: airtight container at room temp, 5–7 days. Do not refrigerate.'
    ]
  },

  { id:'r65', name:'Apple Skin Gastrique', category:'Sauces', yield:'~500ml — pourable, light nappé',
    ingredients:[
      {amount:'200g',  name:'Pink Lady apple skins & cores (from trim)'},
      {amount:'150g',  name:'Sugar'},
      {amount:'150ml', name:'Apple cider vinegar'},
      {amount:'100ml', name:'Water'},
      {amount:'1g',    name:'Fine salt'}
    ],
    steps:[
      'Dry caramel the sugar in a heavy-bottomed pan over medium heat. Do not stir — swirl the pan to even out the melt. Cook to a deep amber, pulling just before it smokes. Color should be dark copper, not golden.',
      'Deglaze carefully with apple cider vinegar. Stand back — it will seize violently and steam. Stir to dissolve any hardened caramel off the bottom.',
      'Add water, apple skins, and cores. Bring to a gentle simmer.',
      'Simmer uncovered 20–25 minutes until skins are completely spent and liquid is lightly syrupy and coats a spoon.',
      'Pass through a fine mesh strainer, pressing solids firmly with a ladle to extract all liquid and pectin.',
      'Season with salt. Taste for sweet-acid balance — adjust with a splash of vinegar if too sweet, or a pinch of dissolved sugar if too sharp. Both adjustments off heat.',
      'Check consistency — should pour freely but coat a spoon lightly. Too thick: let down with a splash of water. Too thin: reduce gently over low heat.',
      'Service: warm gently to order, do not boil. Pool on plate or brush onto foie gras at pickup. Storage: refrigerate, shelf life 2 weeks. Will thicken cold — warm and stir before service.'
    ]
  },

  { id:'r66', name:'Avocado Purée', category:'Purees & Emulsions', yield:'~300g — Hamachi Crudo',
    ingredients:[
      {amount:'2 ea',  name:'Ripe Hass avocados'},

  { id:'r68', name:'Sauce Robert', category:'Sauces', yield:'~500ml — pourable, light nappé',

  { id:'r69', name:'Pine Nut Citrus Crumble', category:'Components', yield:'~200g — Albacore',

    steps:[

  { id:'r70', name:'Bone Marrow & Chive Butter', category:'Components', yield:'~400g / 20 discs — ½" disc per plate',
    ingredients:[

      {amount:'120g',  name:'Poached bone marrow, fully cooled'},

      {amount:'2g',    name:'White pepper'}

    steps:[

  { id:'h1', name:'Agar — Fluid Gel', category:'Hydrocolloid Reference', yield:'See ratios below', ingredients:[{amount:'0.5%',name:'Agar (5g per 1000g) — soft, pourable, loose. Good for sauces & fluid applications'},{amount:'1.0%',name:'Agar (10g per 1000g) — sweet spot. Sets firm, blends smooth and glossy'},{amount:'1.5%',name:'Agar (15g per 1000g) — stiffer set, very stable. Good for piping or structured applications'},{amount:'1.5–2.0%',name:'Agar (15–20g per 1000g) — heat stable. Holds on a hot plate through service, won\'t melt until ~185°F'}], steps:['Hydrate agar in cold liquid. Bring to a full boil — must hit 185°F+ to activate properly.','Season and finish as needed.','Pour into shallow pan. Let set completely — do not rush.','Blend in VitaPrep on high until completely smooth and fluid.','Pass through fine tamis if needed.','Heat-stable notes: at 1.5–2.0%, gel resists melting on a hot plate (holds to ~185°F vs gelatin which melts at ~95°F). Higher solids content and tight blending improve stability further. Avoid high-fat bases as fat can interfere with gel structure.'] },
  { id:'h2', name:'Xanthan Gum — Sauce Body', category:'Hydrocolloid Reference', yield:'See ratios below', ingredients:[{amount:'0.1%',name:'Xanthan (1g per 1000g) — very light. Barely noticeable viscosity, just a touch of body'},{amount:'0.2–0.3%',name:'Xanthan (2–3g per 1000g) — sweet spot. Adds body, prevents syneresis, still pours cleanly'},{amount:'0.5%+',name:'Xanthan (5g+ per 1000g) — thick, gel-like. Starts to feel gluey if pushed further'}], steps:['Always shear in — whisk vigorously or use VitaPrep on high. Will not hydrate properly by hand stirring alone.','Can be added to cold or warm liquid. Hydrates faster in warm.','Xanthan is shear-thinning: flows more easily under pressure (pouring, squeeze bottle) and thickens back at rest — ideal for plating.','A little goes a long way. Always easier to add more than to fix an over-xanthaned sauce.','See Rhubarb Ketchup in this app for a real-world example of xanthan use.'] },
  { id:'h3', name:'Gelatin — Ratios & Usage', category:'Hydrocolloid Reference', yield:'See ratios below', ingredients:[{amount:'1.5–2%',name:'Gelatin (15–20g per 1000g) — firm set. Panna cotta, terrines, molded gels'},{amount:'0.5–1%',name:'Gelatin (5–10g per 1000g) — soft set. Glazes, lightly gelled sauces, velouté body'},{amount:'1 sheet silver',name:'Silver gelatin ≈ 2.5g. Blooms in cold water 5–10 min before use'},{amount:'Note',name:'Melts at ~95°F — not heat stable. Do not use on hot plates.'}], steps:['Bloom gelatin sheets in cold water 5–10 minutes until soft.','Wring out excess water. Melt into warm (not boiling) liquid — above 140°F destroys setting power.','For precise work, weigh gelatin rather than counting sheets (silver sheet = ~2.5g).','Set in refrigerator. Allow full chill before unmolding — minimum 2 hours, overnight preferred.','Not heat stable — will melt above ~95°F. Use agar fluid gel for hot plate applications.'] },
  { id:'h4', name:'Methocel F50 — Hot Gels', category:'Hydrocolloid Reference', yield:'See ratios below', ingredients:[{amount:'1.5–2%',name:'Methocel F50 (15–20g per 1000g) — standard hot gel. Sets when heated, melts when cold'},{amount:'Note',name:'Reverse-sets: liquid when cold, solid when hot — opposite of all other gels'},{amount:'Key',name:'Must be hydrated in cold liquid (below 50°F / ice bath) before use'}], steps:['Disperse Methocel into cold liquid using high shear (blender/VitaPrep) — it will not hydrate in warm liquid.','Chill mixture in ice bath until fully hydrated and smooth, ~10–15 minutes.','When heated above ~130°F, the mixture sets firm. When cooled, it returns to liquid.','Applications: hot foams, gels that hold shape when served warm, fried gels, hot gel noodles.','See Whipped Crispy Artichokes in this app for a real-world Methocel application.'] },
  { id:'h5', name:'Ultra-Tex 8 — Cold Thickening', category:'Hydrocolloid Reference', yield:'See ratios below', ingredients:[{amount:'1–3%',name:'Ultra-Tex 8 (10–30g per 1000g) — adjust to desired consistency'},{amount:'Note',name:'Modified tapioca starch — thickens without heat, no cooking required'},{amount:'Key',name:'Shear in with VitaPrep or high-speed blender for smooth result'}], steps:['Add Ultra-Tex 8 to finished, cold or room temp preparation.','Shear in using VitaPrep or high-speed blender until smooth — do not hand whisk.','Thickens instantly without heat. Adjust amount to reach desired viscosity.','Very stable — holds well under refrigeration, does not weep or synerese.','See Black Sesame Purée in this app for a real-world Ultra-Tex 8 application.'] },
  { id:'r31', name:'Chocolate Sauce', category:'Sauces', yield:'46 fl oz', ingredients:[{amount:'2 cups',name:'Water'},{amount:'1 cup',name:'Sugar, Granulated'},{amount:'1 cup',name:'Corn Syrup'},{amount:'1.5 cups',name:'Ghirardelli Cocoa Powder'},{amount:'2 oz',name:'Chocolate, 66%'}], steps:['Combine water, sugar, and corn syrup in a saucepan. Bring to a boil, stirring until sugar dissolves.','Whisk in cocoa powder until fully incorporated with no lumps.','Remove from heat; stir in chopped 66% chocolate until melted and smooth.','Reserve warm or refrigerate. Rewarm gently before service.'] },

window.doSignIn = async function() {
  L('Opening Google sign-in popup...');
  try {
    const result = await signInWithPopup(auth, new GoogleAuthProvider());
    L('✓ Signed in as: ' + result.user.email);
    L('UID: ' + result.user.uid);
    document.getElementById('btn-write').disabled = false;
    L('\nReady — click "Write r60–r63 to Firestore"');
  } catch(e) {
    L('✗ Sign-in error: ' + e.code + ' — ' + e.message);
  }
};

window.doWrite = async function() {
  const user = auth.currentUser;
  if (!user) { L('Not signed in!'); return; }
  L('\nCurrent user: ' + user.email + ' (uid: ' + user.uid + ')');
  L('Starting writes...\n');

  for (const recipe of RECIPES) {
    L('Writing ' + recipe.name + ' (id: ' + recipe.id + ')...');
    try {
      await setDoc(doc(db, 'recipes', recipe.id), recipe);
      L('  ✓ Written successfully');
      // Immediately verify it's readable
      const check = await getDoc(doc(db, 'recipes', recipe.id));
      if (check.exists()) {
        L('  ✓ Verified readable: ' + check.data().name);
      } else {
        L('  ✗ Write appeared to succeed but doc not found on read-back!');
      }
    } catch(e) {
      L('  ✗ WRITE FAILED: ' + e.code + ' — ' + e.message);
    }
  }
  L('\nDone. Refresh the Beck Kitchen app and check Recipes > Sauces and Breads & Doughs.');
};
